<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
          integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container wrapper">
        <div class="row row-width">
            <h1 class="title">Registration</h1>
            <form method="POST" th:action="@{/registration}" th:object="${user}">
                <div class="input-group mb-3">
                    <span class="input-group-text" id="basic-username">
                        <i class="fa-solid fa-user text-success"></i>
                    </span>
                    <input th:field="${user.username}" type="text" class="form-control"
                           name="username" placeholder="Username" aria-describedby="basic-username">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text text-success" id="basic-password">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input th:field="${user.password}" type="text" class="form-control"
                           name="password" placeholder="Password" aria-describedby="basic-password">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text text-success" id="basic-email">
                        <i class="fa-solid fa-at"></i>
                    </span>
                    <input th:field="${user.email}" type="text" class="form-control"
                           name="email" placeholder="Email" aria-describedby="basic-email">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                    <label class="form-check-label" for="exampleCheck1">Check me out</label>
                </div>
                <button type="submit" class="form-control btn btn-block btn-success">
                    Create an account
                </button>
            </form>
        </div>
    </div>
</body>
</html>
